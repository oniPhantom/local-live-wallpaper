<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  body {
    width: 240px;
    margin: 0;
    padding: 12px;
    background: #17181c;
    color: #f0f0f0;
    font: 13px/1.5 -apple-system, sans-serif;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 13px;
    font-weight: 600;
  }
  button {
    border: none;
    border-radius: 8px;
    background: #2c2e36;
    color: #f0f0f0;
    padding: 7px 0;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { background: #3a3d48; }
  .primary { background: #2563eb; width: 100%; margin-bottom: 6px; }
  .primary:hover { background: #1d4ed8; }
  .danger { background: #3f2226; width: 100%; }
  .danger:hover { background: #57282e; }
  .row {
    display: flex;
    gap: 6px;
    margin: 10px 0;
  }
  .row button { flex: 1; }
  label {
    display: block;
    margin: 8px 0 2px;
    color: #9aa0ad;
    font-size: 11px;
  }
  input[type="range"] { width: 100%; }
  .subtitles {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    color: #f0f0f0;
    font-size: 13px;
  }
  #status {
    margin-top: 10px;
    min-height: 16px;
    color: #9aa0ad;
    font-size: 11px;
  }
</style>
</head>
<body>
  <h1>Live Wallpaper</h1>
  <button id="play-current" class="primary">このタブを壁紙にする</button>
  <button id="off" class="danger">通常壁紙に戻す</button>
  <div class="row">
    <button id="previous" title="前の動画">⏮</button>
    <button id="toggle" title="再生 / 一時停止">⏯</button>
    <button id="next" title="次の動画">⏭</button>
  </div>
  <label for="volume">音量</label>
  <input type="range" id="volume" min="0" max="100" value="0">
  <label for="seek">シーク</label>
  <input type="range" id="seek" min="0" max="1000" value="0">
  <div class="subtitles">
    <input type="checkbox" id="subtitles">
    <label for="subtitles" style="display:inline;margin:0;color:#f0f0f0;font-size:13px;">字幕を表示</label>
  </div>
  <div class="subtitles">
    <input type="checkbox" id="largest-only">
    <label for="largest-only" style="display:inline;margin:0;color:#f0f0f0;font-size:13px;">小さいモニターは映像を止める</label>
  </div>
  <label for="quality">画質上限</label>
  <select id="quality" style="width:100%;background:#2c2e36;color:#f0f0f0;border:none;border-radius:8px;padding:6px;">
    <option value="hd2160">4K (2160p)</option>
    <option value="hd1440">1440p</option>
    <option value="hd1080" selected>1080p</option>
    <option value="hd720">720p</option>
    <option value="large">480p</option>
    <option value="auto">自動(無制限)</option>
  </select>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
