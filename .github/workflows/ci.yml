# push / PR ごとに macOS で build + test を回して退行を検知する
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Swift バージョン確認
        run: swift --version
      - name: ビルド
        run: swift build -c release
      - name: テスト
        run: swift test

  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: SwiftLint
        # ランナーにプリインストールされている SwiftLint を使う（無ければ brew で導入）
        run: |
          command -v swiftlint >/dev/null || brew install swiftlint
          swiftlint version
          swiftlint --strict
